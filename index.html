<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Countdown Timer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="fullscreen-container" id="fullscreen-container">
        
        <div class="timer-display">
            <div class="time-block">
                <span class="number" id="days">00</span>
                <span class="label">Days</span>
            </div>
            <div class="colon">:</div>
            <div class="time-block">
                <span class="number" id="hours">00</span>
                <span class="label">Hours</span>
            </div>
            <div class="colon">:</div>
            <div class="time-block">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutes</span>
            </div>
            <div class="colon">:</div>
            <div class="time-block">
                <span class="number" id="seconds">00</span>
                <span class="label">Seconds</span>
            </div>
        </div>

        <div class="controls-panel">
            <div class="input-section">
                <label for="event-date">Target Date:</label>
                <input type="datetime-local" id="event-date" class="control-input">
            </div>
            <div class="button-group">
                <button id="start-btn" class="btn primary">Start</button>
                <button id="fullscreen-btn" class="btn secondary">Fullscreen [F]</button>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>

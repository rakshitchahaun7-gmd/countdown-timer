<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Timer</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body class="theme-obsidian">
    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>

    <div class="brand">
        <img src="logo.png" alt="Zenith Logo" class="brand-logo">
        <span class="brand-text">ZENITH TIMER</span>
    </div>

    <div class="floating-menu">
        <button id="theme-btn" class="menu-btn" title="Change Theme">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
        <button id="sound-btn" class="menu-btn muted" title="Toggle Sound">
            <svg class="icon-unmuted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <svg class="icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
        </button>
    </div>

    <div class="theme-dropdown" id="theme-dropdown">
        <div class="theme-option" data-theme="theme-obsidian">Obsidian</div>
        <div class="theme-option" data-theme="theme-nebula">Nebula</div>
        <div class="theme-option" data-theme="theme-glass">Frosted Glass</div>
    </div>

    <div class="fullscreen-container" id="fullscreen-container">
        <div class="timer-display">
            <div class="time-block">
                <div class="digit-container"><span class="number" id="days">00</span></div>
                <span class="label">Days</span>
            </div>
            <div class="colon">:</div>
            <div class="time-block">
                <div class="digit-container"><span class="number" id="hours">00</span></div>
                <span class="label">Hours</span>
            </div>
            <div class="colon">:</div>
            <div class="time-block">
                <div class="digit-container"><span class="number" id="minutes">00</span></div>
                <span class="label">Minutes</span>
            </div>
            <div class="colon">:</div>
            <div class="time-block">
                <div class="digit-container"><span class="number" id="seconds">00</span></div>
                <span class="label">Seconds</span>
            </div>
        </div>

        <div class="controls-panel">
            <div class="input-section">
                <label for="event-date">Target Date:</label>
                <input type="datetime-local" id="event-date" class="control-input">
            </div>
            <div class="button-group">
                <button id="start-btn" class="btn primary">Start</button>
                <button id="fullscreen-btn" class="btn secondary">Fullscreen [F]</button>
            </div>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="tick-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-tick-tock-clock-timer-1045.mp3" preload="auto"></audio>
    <audio id="chime-sound" src="https://assets.mixkit.co/sfx/preview/mixkit-glass-bowl-chime-3140.mp3" preload="auto"></audio>

    <script src="script.js?v=2"></script>
</body>
</html>
